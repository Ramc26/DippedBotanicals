<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Designer | Luxe Treats</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --soft-pink: #fff0f3;
            --accent: #ff4d6d; /* Strawberry Red */
            --chocolate: #462214;
            --radius: 30px;
            --shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--chocolate); margin: 0; overflow-x: hidden; }
        
        /* The Visual Preview Area */
        .preview-zone {
            height: 50vh; background: var(--soft-pink);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 10;
        }
        .main-visual {
            max-height: 80%; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.1));
            transition: all 0.5s ease;
        }

        /* The Selection Area */
        .builder-content {
            background: white; position: relative; z-index: 20;
            border-radius: var(--radius) var(--radius) 0 0;
            margin-top: -30px; padding: 2rem; box-shadow: 0 -20px 40px rgba(0,0,0,0.03);
        }

        .section-header { margin-bottom: 2rem; text-align: center; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.5rem; }

        /* The "Dipped" Selection (Pills) */
        .dipped-options { display: flex; gap: 1rem; overflow-x: auto; padding: 1rem 0; scrollbar-width: none; }
        .dip-card {
            min-width: 140px; text-align: center; cursor: pointer;
            transition: transform 0.3s;
        }
        .dip-img {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 4px solid transparent;
            transition: all 0.3s; box-shadow: var(--shadow);
        }
        .dip-card.selected .dip-img { border-color: var(--accent); transform: scale(1.1); }
        .dip-name { margin-top: 10px; font-weight: 600; font-size: 0.9rem; }

        /* Accessory Grid (Like your platter image) */
        .accessory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .acc-card {
            background: #fdfdfd; border: 1px solid #f0f0f0;
            border-radius: 20px; padding: 1rem; display: flex; align-items: center; gap: 1rem;
            cursor: pointer; transition: 0.3s;
        }
        .acc-card.selected { background: var(--soft-pink); border-color: var(--accent); }
        .acc-dot { width: 50px; height: 50px; border-radius: 50%; background: #eee; flex-shrink: 0; }

        /* Sticky Footer */
        footer {
            position: fixed; bottom: 0; width: 100%; padding: 1.5rem 2rem;
            background: white; border-top: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .btn-order {
            background: var(--chocolate); color: white; border: none;
            padding: 1rem 2rem; border-radius: 50px; font-weight: 800;
            font-size: 1.1rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="preview-zone">
        <img id="live-preview" src="https://images.unsplash.com/photo-1590005354167-6da97870c91d?w=800&q=80" class="main-visual">
    </div>

    <div class="builder-content">
        <div class="section-header">
            <h2>Select Your Theme</h2>
            <p>Choose the star of your bouquet</p>
        </div>

        <div class="dipped-options">
            <div class="dip-card selected" onclick="updateTheme('Sunny Sunflowers', 1200, this)">
                <img src="https://www.ediblearrangements.com/images/products/600/3141.jpg" class="dip-img">
                <div class="dip-name">Sunny Smiles</div>
            </div>
            <div class="dip-card" onclick="updateTheme('Chocolate Hearts', 1500, this)">
                <img src="https://www.ediblearrangements.com/images/products/600/4513.jpg" class="dip-img">
                <div class="dip-name">Love Hearts</div>
            </div>
            <div class="dip-card" onclick="updateTheme('Classic Berry', 900, this)">
                <img src="https://www.ediblearrangements.com/images/products/600/3141.jpg" class="dip-img">
                <div class="dip-name">Berry Blast</div>
            </div>
        </div>

        <div class="section-header" style="margin-top: 3rem;">
            <h2>Add Sweet Extras</h2>
            <p>Inspired by our gourmet platters</p>
        </div>

        <div class="accessory-grid">
            <div class="acc-card" onclick="toggleExtra('Dipped Orange', 200, this)">
                <div class="acc-dot" style="background-image: url('https://images.unsplash.com/photo-1582719508461-905c673771fd?w=100&q=80'); background-size: cover;"></div>
                <div>
                    <div style="font-weight: 800;">Dipped Oranges</div>
                    <div style="font-size: 0.8rem; color: var(--accent);">+₹200</div>
                </div>
            </div>
            <div class="acc-card" onclick="toggleExtra('Sprinkle Berries', 300, this)">
                <div class="acc-dot" style="background-image: url('https://images.unsplash.com/photo-1511381939415-e44015466834?w=100&q=80'); background-size: cover;"></div>
                <div>
                    <div style="font-weight: 800;">Sprinkle Berries</div>
                    <div style="font-size: 0.8rem; color: var(--accent);">+₹300</div>
                </div>
            </div>
            <div class="acc-card" onclick="toggleExtra('Plush Bear', 500, this)">
                <div class="acc-dot" style="background-image: url('https://images.unsplash.com/photo-1559454403-b8fb88521f11?w=100&q=80'); background-size: cover;"></div>
                <div>
                    <div style="font-weight: 800;">Teddy Bear</div>
                    <div style="font-size: 0.8rem; color: var(--accent);">+₹500</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div>
            <div style="font-size: 0.8rem; opacity: 0.6;">Total Gift Value</div>
            <div style="font-size: 1.8rem; font-weight: 800;">₹<span id="total">1200</span></div>
        </div>
        <button class="btn-order" onclick="alert('Proceeding to delivery details...')">Next Step ➔</button>
    </footer>

    <script>
        let basePrice = 1200;
        let extras = 0;

        function updateTheme(name, price, el) {
            // UI Selection
            document.querySelectorAll('.dip-card').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            
            basePrice = price;
            updateTotal();
            
            // Visual feedback: In a real app, you'd swap the 'live-preview' src here
            const preview = document.getElementById('live-preview');
            preview.style.opacity = 0;
            setTimeout(() => {
                // Here you would put the specific URL for that theme
                preview.style.opacity = 1;
            }, 300);
        }

        function toggleExtra(name, price, el) {
            if(el.classList.contains('selected')) {
                el.classList.remove('selected');
                extras -= price;
            } else {
                el.classList.add('selected');
                extras += price;
            }
            updateTotal();
        }

        function updateTotal() {
            document.getElementById('total').innerText = basePrice + extras;
        }
    </script>
</body>
</html>
